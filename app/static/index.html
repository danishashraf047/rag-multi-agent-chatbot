<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Multi-Agent Chat</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sessions-panel">
        <div class="brand">
          <div class="mark">LG</div>
          <div>
            <h1>Agent Console</h1>
            <p>LangGraph sessions</p>
          </div>
        </div>

        <button id="newSessionButton" class="primary-button" type="button">New session</button>

        <section class="ingest-panel" aria-label="RAG file ingestion">
          <div>
            <p class="eyebrow">Knowledge base</p>
            <h2>Ingest file</h2>
          </div>
          <label class="file-picker">
            <input
              id="ragFileInput"
              type="file"
              accept=".txt,.md,.markdown,.py,.js,.jsx,.ts,.tsx,.json,.csv,.yaml,.yml,.html,.css"
            />
            <span id="ragFileLabel">Choose a text file</span>
          </label>
          <button id="ingestFileButton" class="secondary-button" type="button" disabled>
            Ingest for RAG
          </button>
          <p id="ingestStatus" class="ingest-status">No file selected</p>
        </section>

        <div class="session-list-header">
          <span>Sessions</span>
          <button id="clearSessionsButton" class="ghost-button" type="button">Clear</button>
        </div>
        <nav id="sessionList" class="session-list" aria-label="Conversation sessions"></nav>
      </aside>

      <section class="chat-panel">
        <header class="chat-header">
          <div>
            <p class="eyebrow">Current session</p>
            <h2 id="sessionTitle">New conversation</h2>
          </div>
          <div id="connectionStatus" class="status-pill">Ready</div>
        </header>

        <section class="workflow-panel" aria-label="Agent workflow">
          <div class="workflow-heading">
            <div>
              <p class="eyebrow">Workflow</p>
              <h3>Agent routing</h3>
            </div>
            <div id="routeStatus" class="route-status">Waiting for request</div>
          </div>

          <div class="agent-strip" aria-label="Agent activity">
            <div class="agent-step" data-agent="supervisor">
              <span>1</span>
              <strong>Supervisor</strong>
            </div>
            <div class="agent-step" data-agent="planning">
              <span>2</span>
              <strong>Planning</strong>
            </div>
            <div class="agent-step" data-agent="research">
              <span>3</span>
              <strong>Research</strong>
            </div>
            <div class="agent-step" data-agent="coding">
              <span>4</span>
              <strong>Coding</strong>
            </div>
            <div class="agent-step" data-agent="rag">
              <span>5</span>
              <strong>RAG</strong>
            </div>
            <div class="agent-step" data-agent="aggregate">
              <span>6</span>
              <strong>Aggregate</strong>
            </div>
          </div>
        </section>

        <section id="messages" class="messages" aria-live="polite"></section>

        <form id="chatForm" class="composer">
          <textarea
            id="messageInput"
            rows="3"
            placeholder="Ask for research, code, planning, or a knowledge-base answer..."
            required
          ></textarea>
          <div class="composer-actions">
            <div id="activeAgent" class="active-agent">No agent running</div>
            <button id="sendButton" class="primary-button" type="submit">Send</button>
          </div>
        </form>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
